services:
  api:
    build: .
    ports:
      - "${BIND_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://kairox:${POSTGRES_PASSWORD:-kairox}@db:5432/kairox
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      MIGRATIONS_PATH: /app/migrations
      RUST_LOG: ${RUST_LOG:-kairox_api=info,tower_http=info}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kairox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kairox}
      POSTGRES_DB: kairox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairox -d kairox"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
